name: CI Pipeline

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────
  # JOB 1: Backend Lint
  # ───────────────────────────────────────────
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install lint tools
        run: pip install flake8 black isort --quiet

      - name: Black — format check
        run: black --check --diff backend/

      - name: isort — import order check
        run: isort --check-only --diff backend/

      - name: Flake8 — style errors
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=backend/venv,backend/__pycache__ \
            --count --statistics

  # ───────────────────────────────────────────
  # JOB 2: Backend Tests
  # ───────────────────────────────────────────
  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        env:
          TESTING: "true"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          pytest tests/backend/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7

  # ───────────────────────────────────────────
  # JOB 3: Backend Security Scan
  # ───────────────────────────────────────────
  backend-security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install security tools
        run: pip install bandit safety --quiet

      - name: Bandit — code vulnerability scan
        run: |
          bandit -r backend/ \
            -x backend/venv,backend/__pycache__ \
            --severity-level medium \
            -f json -o bandit-report.json || true

      - name: Safety — dependency CVE check
        run: safety check -r requirements.txt || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  # ───────────────────────────────────────────
  # JOB 4: Frontend Lint
  # ───────────────────────────────────────────
  frontend-lint:
    name: 🔍 Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint --if-present || npx eslint src/ --ext .js,.jsx,.ts,.tsx || true

  # ───────────────────────────────────────────
  # JOB 5: Frontend Build
  # ───────────────────────────────────────────
  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 3

  # ───────────────────────────────────────────
  # JOB 6: Frontend Tests
  # ───────────────────────────────────────────
  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ───────────────────────────────────────────
  # JOB 7: Docker Build Check
  # ───────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rag-system:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max