[tool.black]
line-length = 120
target-version = ["py310"]
exclude = '''
/(
    backend/venv
  | __pycache__
  | \.git
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip_glob = ["backend/venv/*", "*/__pycache__/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"